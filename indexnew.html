<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HygieGo - เพื่อนคู่คิด มาตรฐานร้านอาหาร Street Food</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/DB.js" type="module"></script>

    <style>
        body { font-family: 'Prompt', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .hero-gradient {
            background: radial-gradient(circle at top right, rgba(0, 195, 170, 0.15), transparent),
                        radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.1), transparent);
        }
        .modal-blur {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
        }
        /* คลาสสำหรับซ่อน elements */
        .hidden { display: none; }
    </style>
</head>
<body class="bg-[#0f172a] text-white selection:bg-[#00C3AA]/30">

     <nav class="fixed w-full z-50 bg-[#0f172a]/80 backdrop-blur-md border-b border-white/5">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fas fa-shield-alt text-[#00C3AA] text-2xl"></i>
                <span class="text-2xl font-bold bg-gradient-to-r from-[#00C3AA] to-blue-500 bg-clip-text text-transparent">
                    HygieGo
                </span>
            </div>
            
            <div class="hidden md:flex items-center gap-8 text-sm font-medium text-gray-400">
                <a href="indexnew.html" class="hover:text-white transition">หน้าหลัก</a>
                <a href="portfolio.html" class="hover:text-white transition">ผลงาน</a>
                <a href="pricing.html" class="hover:text-white transition">แพ็กเกจราคา</a>
            </div>

            <div class="flex items-center gap-4">
                <div id="auth-guest" class="flex items-center gap-4">
                    <a href="auth/login.html" class="text-sm font-semibold hover:text-[#00C3AA] transition">เข้าสู่ระบบ</a>
                    <a href="auth/register.html" class="bg-[#00C3AA] text-white px-6 py-2.5 rounded-full font-bold text-sm">เริ่มต้นใช้งาน</a>
                </div>

                <div id="auth-user" class="hidden flex items-center gap-4">
                    <div class="flex items-center gap-3 bg-white/5 px-4 py-2 rounded-2xl border border-white/10 shadow-lg">
                        <div id="user-avatar" class="w-8 h-8 rounded-full bg-gradient-to-tr from-[#00C3AA] to-blue-500 flex items-center justify-center text-[#0f172a] font-bold text-xs">
                            </div>
                        <span id="display-user-name" class="text-xs font-bold text-gray-200"></span>
                    </div>
                    <a id="dashboard-link" href="#" class="bg-white/5 hover:bg-[#00C3AA] hover:text-[#0f172a] text-[#00C3AA] border border-[#00C3AA]/30 px-5 py-2 rounded-xl font-bold text-xs transition-all">
                        Dashboard <i class="fa-solid fa-arrow-right ml-1"></i>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <header class="relative pt-40 pb-24 px-6 hero-gradient overflow-hidden">
        <div class="max-w-5xl mx-auto text-center relative z-10">
            <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-[#00C3AA]/10 border border-[#00C3AA]/20 text-[#00C3AA] text-xs font-bold mb-8">
                <i class="fas fa-star"></i> อันดับ 1 บริการขอใบรับรองมาตรฐานร้านอาหาร
            </div>
            <h1 class="text-5xl md:text-7xl font-black mb-8 leading-tight">
                อยากให้ร้านมี <span class="text-[#00C3AA]">"ป้ายรับรอง"</span><br>
                แต่ไม่รู้จะเริ่มยังไง?
            </h1>
            <p class="text-gray-400 max-w-2xl mx-auto text-lg mb-12">
                HygieGo ช่วยคุณเตรียมร้านให้ผ่านเกณฑ์สาธารณสุขง่ายๆ ตั้งแต่ทำความสะอาด จัดระเบียบครัว จนถึงยื่นเอกสาร จบครบในที่เดียว
            </p>
            <div class="flex flex-wrap justify-center gap-4">
                <button onclick="location.href='auth/register.html'" class="bg-[#00C3AA] px-10 py-4 rounded-2xl font-bold text-lg hover:bg-[#00a892] transition shadow-lg">เริ่มต้นใช้งานฟรี</button>
                <button class="glass-card px-10 py-4 rounded-2xl font-bold text-lg hover:bg-white/5 transition">ดูขั้นตอนการทำงาน</button>
            </div>
        </div>

        <div class="max-w-4xl mx-auto mt-20 pt-10 border-t border-white/5 flex justify-center gap-12 opacity-40 grayscale hover:grayscale-0 transition-all duration-500">
            <i class="fas fa-award text-4xl" title="Certificate Guaranteed"></i>
            <i class="fas fa-handshake text-4xl" title="Gov Partner"></i>
            <i class="fas fa-user-shield text-4xl" title="Food Safety"></i>
            <i class="fas fa-store text-4xl" title="Street Food Standard"></i>
        </div>
    </header>

    <section id="services" class="py-24 px-6 bg-[#0f172a]">
        </section>

    <footer class="bg-[#020617] border-t border-white/5 py-20 px-6">
        </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ดึงข้อมูลจาก localStorage ที่ถูกบันทึกไว้ตอน Login
            const savedUser = JSON.parse(localStorage.getItem('hygieUser'));
            const role = localStorage.getItem('hygieRole');

            const guestZone = document.getElementById('auth-guest');
            const userZone = document.getElementById('auth-user');
            const nameDisplay = document.getElementById('display-user-name');
            const avatarDisplay = document.getElementById('user-avatar');
            const dashboardLink = document.getElementById('dashboard-link');

            if (savedUser) {
                // 1. ซ่อนปุ่ม Login/Register และแสดงข้อมูล User แทน
                guestZone.classList.add('hidden');
                userZone.classList.remove('hidden');

                // 2. แสดงชื่อผู้ใช้ (ใช้ first_name)
                nameDisplay.innerText = savedUser.first_name;

                // 3. ทำตัวอักษรย่อสำหรับ Avatar (เช่น Somchai -> S)
                avatarDisplay.innerText = savedUser.first_name.charAt(0).toUpperCase();

                // 4. ตั้งค่าลิงก์ Dashboard ตาม Role
                if (role === 'admin') {
                    dashboardLink.href = 'admin/admin-dashboard.html';
                } else {
                    dashboardLink.href = 'customer/customer-dashboard.html';
                }
            }
        });
    </script>
</body>
</html>
