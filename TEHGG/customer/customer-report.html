<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายงานการตรวจมาตรฐาน - HygieGo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; }
    </style>
</head>
<body class="p-6 md:p-12 text-left">

    <div class="max-w-4xl mx-auto bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-slate-100">
        <div class="bg-[#0f172a] p-10 text-white flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-[#00c3aa]">Inspection Report</h1>
                <p class="text-slate-400 text-sm mt-1">รายงานผลการตรวจมาตรฐานความสะอาด</p>
            </div>
            <div id="statusBadge" class="px-6 py-2 rounded-full font-bold uppercase tracking-widest text-xs border-2">
                Loading...
            </div>
        </div>

        <div class="p-10 space-y-10">
            <section class="grid grid-cols-2 gap-8 border-b border-slate-50 pb-8">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">ชื่อร้านอาหาร</p>
                    <h2 id="storeName" class="text-xl font-bold text-slate-800">-</h2>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">วันที่ออกรายงาน</p>
                    <p id="reportDate" class="text-slate-600">-</p>
                </div>
            </section>

            <section>
                <h3 class="font-bold text-slate-800 mb-6 flex items-center gap-2">
                    <i class="fa-solid fa-chart-simple text-[#00c3aa]"></i> รายละเอียดคะแนน
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-slate-50 p-6 rounded-3xl text-center">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Floor Score</p>
                        <p id="floorScore" class="text-3xl font-bold text-slate-800">0</p>
                    </div>
                    <div class="bg-slate-50 p-6 rounded-3xl text-center">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Counter Score</p>
                        <p id="counterScore" class="text-3xl font-bold text-slate-800">0</p>
                    </div>
                    <div class="bg-[#00c3aa]/10 p-6 rounded-3xl text-center border border-[#00c3aa]/20">
                        <p class="text-[10px] font-bold text-[#00c3aa] uppercase">Total Rating</p>
                        <p id="totalScore" class="text-3xl font-bold text-[#00c3aa]">0.0</p>
                    </div>
                </div>
            </section>

            <section class="bg-slate-50 p-8 rounded-3xl border border-slate-100">
                <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">ข้อเสนอแนะจากผู้เชี่ยวชาญ</p>
                <p id="adminComment" class="text-slate-700 italic text-sm">" - ไม่มีคอมเมนต์เพิ่มเติม - "</p>
            </section>

            <div class="flex justify-center pt-6">
                <button onclick="history.back()" class="px-8 py-3 bg-[#0f172a] text-white rounded-2xl font-bold text-sm hover:bg-slate-800 transition shadow-lg">
                    กลับหน้าแดชบอร์ด
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import db from '../js/DB.js';

        const SUPABASE_URL = 'https://yqlbdwfcnffjuzjznrbi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_JFvzaU8LuSa8KzL7o7Fmaw_J4oergY7';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const bookingId = urlParams.get('id');

        async function init() {
            await db.init();
            if (!bookingId) return;

            // ดึงข้อมูลการจองและผลตรวจ
            const { data: booking, error } = await client
                .from('booking')
                .select('*, users(restaurant_name), inspection(*)')
                .eq('booking_id', bookingId)
                .single();

            if (booking && booking.inspection.length > 0) {
                const ins = booking.inspection[0];
                document.getElementById('storeName').innerText = booking.users.restaurant_name;
                document.getElementById('reportDate').innerText = ins.inspection_date;
                document.getElementById('floorScore').innerText = ins.floor_score;
                document.getElementById('counterScore').innerText = ins.counter_score;
                document.getElementById('totalScore').innerText = Number(ins.total_score).toFixed(1);
                document.getElementById('adminComment').innerText = ins.admin_comment || "-";

                const badge = document.getElementById('statusBadge');
                badge.innerText = ins.result;
                if (ins.result === 'Pass') {
                    badge.classList.add('border-emerald-500', 'text-emerald-500');
                } else {
                    badge.classList.add('border-red-500', 'text-red-500');
                }
            }
        }
        init();
    </script>
</body>
</html>
