<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ประวัติการตรวจ - HygieGo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; }
    </style>
</head>
<body class="bg-[#0f172a] text-white flex min-h-screen">

    <aside class="w-72 bg-[#0f172a] text-white flex flex-col fixed h-full z-50">
        <div class="p-8">
            <a class="flex items-center gap-3 mb-8" href="../index.html">
                <div class="w-10 h-10 bg-[#00c3aa] rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-shield-virus text-xl"></i>
                </div>
                <h1 class="text-2xl font-bold tracking-tight text-left">Hygie<span class="text-[#00c3aa]">Go</span></h1>
            </a>

            <div class="p-4 bg-slate-800/50 rounded-2xl border border-slate-700 mb-8">
                <div class="flex items-center gap-3">
                    <div id="userInitials" class="w-10 h-10 rounded-full bg-gradient-to-tr from-[#00c3aa] to-blue-500 flex items-center justify-center font-bold text-white uppercase">?</div>
                    <div class="overflow-hidden text-left">
                        <p id="sideUserName" class="text-sm font-semibold truncate">Loading...</p>
                        <p id="userRole" class="text-[10px] text-[#00c3aa] font-bold uppercase tracking-widest">Premium Member</p>
                    </div>
                </div>
            </div>

            <nav class="space-y-2 text-left">
                <a href="customer-dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-800">
                    <i class="fa-solid fa-grip-vertical w-5"></i> ภาพรวมระบบ
                </a>
                <a href="customer-history.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-[#00c3aa] text-white shadow-lg ">
                    <i class="fa-solid fa-clipboard-check w-5"></i> ประวัติการตรวจ
                </a>
            </nav>
        </div>
        <div class="mt-auto p-6">
            <button id="btnLogout" class="w-full py-3 rounded-xl bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition-all flex items-center justify-center gap-2 text-sm font-medium">
                <i class="fa-solid fa-power-off"></i> ออกจากระบบ
            </button>
        </div>
    </aside>

    <main class="flex-1 ml-64 p-8">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-2xl font-bold text-white">ประวัติการตรวจย้อนหลัง</h1>
                <p class="text-gray-400 text-sm">ตรวจสอบคะแนนและผลการประเมินมาตรฐาน</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white/5 p-6 rounded-3xl border border-white/5">
                <p class="text-gray-400 text-xs mb-1">ตรวจไปแล้ว</p>
                <h2 id="totalInspections" class="text-3xl font-bold">0 <span class="text-sm font-normal text-gray-500">ครั้ง</span></h2>
            </div>
            <div class="bg-white/5 p-6 rounded-3xl border border-[#00c3aa]/30">
                <p class="text-gray-400 text-xs mb-1">คะแนนเฉลี่ย</p>
                <h2 id="avgScore" class="text-3xl font-bold text-[#00c3aa]">0</h2>
            </div>
            <div class="bg-white/5 p-6 rounded-3xl border border-white/5">
                <p class="text-gray-400 text-xs mb-1">สถานะล่าสุด</p>
                <h2 id="latestResult" class="text-3xl font-bold text-blue-400">-</h2>
            </div>
        </div>

        <div class="bg-white/5 rounded-3xl border border-white/5 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-white/5 text-[11px] uppercase tracking-widest text-gray-400 font-bold">
                    <tr>
                        <th class="px-8 py-5">วันที่ตรวจ</th>
                        <th class="px-8 py-5">คะแนน (100)</th>
                        <th class="px-8 py-5">ผลการตรวจ</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody" class="divide-y divide-white/5">
                    </tbody>
            </table>
        </div>
    </main>

    <script type="module">
        const SUPABASE_URL = 'https://yqlbdwfcnffjuzjznrbi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_JFvzaU8LuSa8KzL7o7Fmaw_J4oergY7';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const savedUser = JSON.parse(localStorage.getItem('hygieUser'));

        async function init() {
            if (!savedUser) { window.location.href = '../auth/login.html'; return; }

            // Profile Mapping เหมือน Dashboard
            document.getElementById('userInitials').innerText = savedUser.first_name.charAt(0);
            document.getElementById('sideUserName').innerText = savedUser.first_name;
            document.getElementById('welcomeName').innerText = savedUser.first_name;
            document.getElementById('restaurantTitle').innerText = savedUser.restaurant_name || 'My Restaurant';
            

            loadHistory();
        }

        async function loadHistory() {
            const { data, error } = await client
                .from('booking')
                .select('*, inspection(*)')
                .eq('user_id', savedUser.user_id)
                .order('created_at', { ascending: false });

            if (error) return;

            const tbody = document.getElementById('historyTableBody');
            tbody.innerHTML = '';
            
            let total = 0; let count = 0;

            data.forEach(item => {
                const insp = item.inspection[0];
                const score = insp?.total_score || 0;
                const result = insp?.result || 'Pending';
                if (insp) { total += score; count++; }

                tbody.innerHTML += `
                    <tr class="hover:bg-white/5 transition-all">
                        <td class="px-8 py-6 text-sm">${item.booking_date}</td>
                        <td class="px-8 py-6 font-bold text-xl">${score}</td>
                        <td class="px-8 py-6">
                            <span class="px-3 py-1 rounded-full text-[10px] font-bold ${result==='Pass'?'bg-emerald-500/20 text-emerald-400':'bg-orange-500/20 text-orange-400'}">
                                ${result}
                            </span>
                        </td>
                    </tr>
                `;
            });

            document.getElementById('totalInspections').innerText = data.length;
            document.getElementById('avgScore').innerText = count > 0 ? (total/count).toFixed(1) : '0';
            document.getElementById('latestResult').innerText = data[0]?.inspection[0]?.result || '-';
        }

        document.getElementById('btnLogout').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = '../auth/login.html';
        });

        init();
    </script>
</body>

</html>
