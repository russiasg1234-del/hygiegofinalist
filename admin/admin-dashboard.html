<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HygieGo Admin - Management Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: white; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .sidebar-item-active {
            background: rgba(0, 195, 170, 0.1);
            color: #00c3aa;
            border-right: 4px solid #00c3aa;
        }

        /* Custom scrollbar for table */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-72 bg-[#020617] border-r border-white/5 fixed h-full flex flex-col z-50">
        <div class="p-8 border-b border-white/5">
            <h1 class="text-2xl font-bold tracking-tight text-white">Hygie<span class="text-[#00c3aa]">Go</span></h1>
            <p class="text-[10px] text-[#00c3aa] font-bold uppercase mt-1 tracking-widest italic">Administrator Panel</p>
        </div>
        
        <nav class="flex-1 py-6">
            <a href="#" class="flex items-center gap-4 px-8 py-4 sidebar-item-active transition-all">
                <i class="fa-solid fa-chart-pie text-lg"></i>
                <span class="text-sm font-medium">ภาพรวมระบบ</span>
            </a>
            <a href="#" class="flex items-center gap-4 px-8 py-4 text-gray-400 hover:bg-white/5 transition-all">
                <i class="fa-solid fa-users text-lg"></i>
                <span class="text-sm font-medium">จัดการผู้ใช้งาน</span>
            </a>
        </nav>

        <div class="p-8 border-t border-white/5">
            <button id="btnLogout" class="w-full py-4 bg-red-500/10 text-red-500 rounded-2xl hover:bg-red-500 hover:text-white transition-all text-xs font-bold flex items-center justify-center gap-3">
                <i class="fa-solid fa-power-off"></i> ออกจากระบบ
            </button>
        </div>
    </aside>

    <main class="flex-1 ml-72 p-10">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h2 class="text-4xl font-black text-white tracking-tight">ระบบจัดการงานตรวจ</h2>
                <p class="text-gray-400 mt-2 font-light">ยินดีต้อนรับคุณ <span id="adminName" class="font-bold text-[#00c3aa]">...</span></p>
            </div>
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 rounded-2xl glass-card flex items-center justify-center text-[#00c3aa]">
                    <i class="fa-solid fa-bell"></i>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="glass-card p-8 rounded-[2rem] relative overflow-hidden group">
                <p class="text-gray-500 text-xs font-bold uppercase mb-3 tracking-widest">งานทั้งหมดในระบบ</p>
                <h3 id="statTotal" class="text-5xl font-black text-white">0</h3>
                <div class="absolute -right-4 -bottom-4 text-white/5 text-8xl rotate-12 group-hover:rotate-0 transition-transform">
                    <i class="fa-solid fa-folder-open"></i>
                </div>
            </div>
            <div class="glass-card p-8 rounded-[2rem] relative overflow-hidden group">
                <p class="text-orange-500/50 text-xs font-bold uppercase mb-3 tracking-widest">รอดำเนินการ</p>
                <h3 id="statPending" class="text-5xl font-black text-orange-500">0</h3>
                <div class="absolute -right-4 -bottom-4 text-orange-500/5 text-8xl rotate-12">
                    <i class="fa-solid fa-clock"></i>
                </div>
            </div>
            <div class="glass-card p-8 rounded-[2rem] relative overflow-hidden group">
                <p class="text-[#00c3aa]/50 text-xs font-bold uppercase mb-3 tracking-widest">ตรวจเสร็จสิ้น</p>
                <h3 id="statDone" class="text-5xl font-black text-[#00c3aa]">0</h3>
                <div class="absolute -right-4 -bottom-4 text-[#00c3aa]/5 text-8xl rotate-12">
                    <i class="fa-solid fa-check-double"></i>
                </div>
            </div>
        </div>

        <section class="glass-card rounded-[2.5rem] overflow-hidden">
            <div class="p-10 border-b border-white/5 flex flex-wrap justify-between items-center gap-6">
                <h3 class="font-black text-white text-xl flex items-center gap-3">
                    <i class="fa-solid fa-list-check text-[#00c3aa]"></i> รายการงานปัจจุบัน
                </h3>
                <div class="relative w-full md:w-80">
                    <i class="fa-solid fa-search absolute left-5 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
                    <input type="text" id="searchInput" placeholder="ค้นหาชื่อร้านอาหาร..." 
                        class="w-full pl-12 pr-6 py-4 bg-white/5 border border-white/5 rounded-2xl text-sm focus:ring-2 focus:ring-[#00c3aa] outline-none transition-all">
                </div>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-white/[0.02] text-gray-500 text-[10px] font-black uppercase tracking-[0.2em]">
                        <tr>
                            <th class="px-10 py-6">ร้านอาหาร / ID</th>
                            <th class="px-10 py-6">สถานะงาน</th>
                            <th class="px-10 py-6 text-center">วันที่ส่งคำขอ</th>
                            <th class="px-10 py-6 text-right">การจัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="taskTableBody" class="divide-y divide-white/5">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script type="module">
        // 1. Supabase Client Setup
        const SUPABASE_URL = 'https://yqlbdwfcnffjuzjznrbi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_JFvzaU8LuSa8KzL7o7Fmaw_J4oergY7';
        const _client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allBookings = [];

        async function init() {
            // Check Admin Auth
            const savedUser = JSON.parse(localStorage.getItem('hygieUser'));
            if (!savedUser || savedUser.role !== 'admin') {
                window.location.href = '../auth/login.html';
                return;
            }
            document.getElementById('adminName').innerText = savedUser.first_name || 'Administrator';
            await fetchTasks();
        }

        // 2. Fetch Tasks with Fixed Relational Query
        async function fetchTasks() {
            try {
                const { data, error } = await _client
                    .from('booking')
                    .select(`
                        *,
                        users (
                            restaurant_name
                        )
                    `) // ดึงข้อมูลจากตาราง users ตรงๆ ผ่าน Foreign Key
                    .order('booking_id', { ascending: false });

                if (error) throw error;
                
                allBookings = data;
                updateStats(data);
                renderTable(data);
            } catch (err) { 
                console.error("Fetch Tasks Error:", err.message); //
                Swal.fire('Database Error', err.message, 'error');
            }
        }

        function updateStats(bookings) {
            document.getElementById('statTotal').innerText = bookings.length;
            document.getElementById('statPending').innerText = bookings.filter(b => b.status !== 'Completed').length;
            document.getElementById('statDone').innerText = bookings.filter(b => b.status === 'Completed').length;
        }

        // 3. Render Table Function
        function renderTable(bookings) {
            const tbody = document.getElementById('taskTableBody');
            tbody.innerHTML = '';

            if (bookings.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="py-20 text-center text-gray-500">ไม่พบรายการข้อมูลงานตรวจ</td></tr>`;
                return;
            }

            bookings.forEach(task => {
                const shopName = task.users?.restaurant_name || 'ไม่ทราบชื่อร้าน';
                const statusClass = task.status === 'Completed' 
                    ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' 
                    : 'bg-orange-500/10 text-orange-400 border-orange-500/20';
                
                tbody.innerHTML += `
                    <tr class="hover:bg-white/[0.02] transition-all group">
                        <td class="px-10 py-7">
                            <p class="font-bold text-gray-200 group-hover:text-[#00c3aa] transition-colors">${shopName}</p>
                            <p class="text-[9px] font-mono text-gray-500 mt-1 uppercase tracking-widest">JOB ID: ${task.booking_id}</p>
                        </td>
                        <td class="px-10 py-7">
                            <span class="px-4 py-2 rounded-xl border text-[10px] font-black uppercase tracking-widest ${statusClass}">${task.status}</span>
                        </td>
                        <td class="px-10 py-7 text-gray-400 text-xs text-center font-medium">${task.booking_date || '-'}</td>
                        <td class="px-10 py-7 text-right">
                            <div class="flex justify-end gap-3">
                                <button onclick="location.href='admin-task-detail.html?id=${task.booking_id}'" class="w-10 h-10 rounded-xl bg-white/5 text-gray-400 hover:bg-[#00c3aa] hover:text-[#0f172a] transition-all flex items-center justify-center">
                                    <i class="fa-solid fa-pen-to-square text-xs"></i>
                                </button>
                                <button onclick="window.deleteTask('${task.booking_id}')" class="w-10 h-10 rounded-xl bg-red-500/5 text-red-400 hover:bg-red-500 hover:text-white transition-all flex items-center justify-center">
                                    <i class="fa-solid fa-trash-can text-xs"></i>
                                </button>
                            </div>
                        </td>
                    </tr>`;
            });
        }

        // 4. Global Functions
        window.deleteTask = async (id) => {
            const res = await Swal.fire({
                title: 'ยืนยันการลบงาน?',
                text: 'การลบข้อมูลนี้อาจส่งผลต่อประวัติของลูกค้า คุณแน่ใจหรือไม่?',
                icon: 'warning',
                background: '#1e293b',
                color: '#fff',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'ใช่, ลบเลย',
                cancelButtonText: 'ยกเลิก'
            });

            if (res.isConfirmed) {
                const { error } = await _client.from('booking').delete().eq('booking_id', id);
                if (error) Swal.fire('Error', error.message, 'error');
                else {
                    Swal.fire({ title: 'ลบสำเร็จ', icon: 'success', timer: 1000, showConfirmButton: false });
                    fetchTasks();
                }
            }
        };

        // Search Logic
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allBookings.filter(b => 
                (b.users?.restaurant_name || '').toLowerCase().includes(val) ||
                String(b.booking_id).includes(val)
            );
            renderTable(filtered);
        });

        document.getElementById('btnLogout').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = '../auth/login.html';
        });

        init();
    </script>
</body>
</html>
