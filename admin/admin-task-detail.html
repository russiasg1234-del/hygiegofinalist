<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายละเอียดงานตรวจ - HygieGo Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: white; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        input, select, textarea {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="bg-[#020617] border-b border-white/5 p-5 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <button onclick="location.href='admin-dashboard.html'" class="flex items-center gap-2 text-gray-400 hover:text-[#00c3aa] transition-all">
                <i class="fa-solid fa-chevron-left text-xs"></i> 
                <span class="text-sm font-bold uppercase tracking-widest">Back to Dashboard</span>
            </button>
            <h1 class="font-black tracking-widest text-[#00c3aa] text-lg uppercase">Inspection Detail</h1>
            <div class="w-10"></div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6 md:p-12">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            
            <div class="lg:col-span-2 space-y-8">
                <section class="glass-card p-8 rounded-[2.5rem]">
                    <h3 class="text-xl font-black text-white mb-6 flex items-center gap-3">
                        <i class="fa-solid fa-store text-[#00c3aa]"></i> ข้อมูลร้านค้าและงานตรวจ
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <p class="text-[10px] text-gray-500 font-black uppercase tracking-widest mb-1">ชื่อร้านอาหาร</p>
                            <p id="detRestaurant" class="text-lg font-bold text-white">กำลังโหลด...</p>
                        </div>
                        <div>
                            <p class="text-[10px] text-gray-500 font-black uppercase tracking-widest mb-1">สถานะปัจจุบัน</p>
                            <span id="detStatus" class="inline-block px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest bg-white/5">-</span>
                        </div>
                        <div class="md:col-span-2 pt-4 border-t border-white/5">
                            <p class="text-[10px] text-gray-500 font-black uppercase tracking-widest mb-1">ID งานอ้างอิง</p>
                            <p id="detBookingId" class="text-xs font-mono text-gray-400">#</p>
                        </div>
                    </div>
                </section>

                <section class="glass-card p-8 rounded-[2.5rem]">
                    <h3 class="text-xl font-black text-white mb-6 flex items-center gap-3">
                        <i class="fa-solid fa-images text-[#00c3aa]"></i> รูปภาพประกอบการประเมิน
                    </h3>
                    <div id="customerImages" class="grid grid-cols-2 md:grid-cols-3 gap-4 min-h-[200px]">
                        </div>
                </section>
            </div>

            <div class="space-y-8">
                <section class="glass-card p-8 rounded-[2.5rem] sticky top-32">
                    <h3 class="text-xl font-black text-white mb-8 border-b border-white/5 pb-4 uppercase tracking-widest">Action Panel</h3>
                    
                    <div class="space-y-6">
                        <div>
                            <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest block mb-3">สถานะการทำงาน</label>
                            <select id="updateStatus" class="w-full p-4 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-[#00c3aa] transition-all">
                                <option value="Pending">Pending</option>
                                <option value="In Progress">In Progress</option>
                                <option value="Completed">Completed</option>
                            </select>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest block mb-2">Floor Score</label>
                                <input type="number" id="floor_score" min="0" max="100" placeholder="0-100" class="w-full p-4 rounded-2xl text-sm outline-none">
                            </div>
                            <div>
                                <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest block mb-2">Counter Score</label>
                                <input type="number" id="counter_score" min="0" max="100" placeholder="0-100" class="w-full p-4 rounded-2xl text-sm outline-none">
                            </div>
                        </div>

                        <div>
                            <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest block mb-3">ผลการประเมินเบื้องต้น</label>
                            <select id="finalResult" class="w-full p-4 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-[#00c3aa]">
                                <option value="Pass">Pass (ผ่านเกณฑ์)</option>
                                <option value="Fail">Fail (ไม่ผ่านเกณฑ์)</option>
                            </select>
                        </div>

                        <button id="btnSaveTask" class="w-full py-5 bg-[#00c3aa] text-[#0f172a] rounded-[1.5rem] font-black uppercase tracking-widest shadow-lg shadow-[#00c3aa]/20 hover:scale-[1.02] active:scale-[0.98] transition-all">
                            Save Inspection
                        </button>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <script type="module">
        // 1. Supabase Setup
        const SUPABASE_URL = 'https://yqlbdwfcnffjuzjznrbi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_JFvzaU8LuSa8KzL7o7Fmaw_J4oergY7';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const bookingId = urlParams.get('id');

        async function init() {
            const savedUser = JSON.parse(localStorage.getItem('hygieUser'));
            if (!savedUser || savedUser.role !== 'admin') {
                window.location.href = '../auth/login.html';
                return;
            }
            if (!bookingId) {
                Swal.fire('Error', 'ไม่พบรหัสงานตรวจ', 'error').then(() => location.href = 'admin-dashboard.html');
                return;
            }
            await loadTaskDetail();
        }

        // 2. Load Task Detail with Fixed Relationship
        async function loadTaskDetail() {
            try {
                // ดึงข้อมูลการจอง พร้อมข้อมูลร้านอาหารจากตาราง users โดยตรง
                const { data: booking, error } = await client
                    .from('booking')
                    .select('*, users(restaurant_name, user_id), inspection(*)')
                    .eq('booking_id', bookingId)
                    .single();

                if (error) throw error;

                // อัปเดต UI
                document.getElementById('detRestaurant').innerText = booking.users?.restaurant_name || 'ไม่ทราบชื่อร้าน';
                document.getElementById('detBookingId').innerText = `ID: ${booking.booking_id}`;
                document.getElementById('detStatus').innerText = booking.status;
                document.getElementById('updateStatus').value = booking.status;

                const statusEl = document.getElementById('detStatus');
                statusEl.className = `inline-block px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest ${
                    booking.status === 'Completed' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-orange-500/10 text-orange-400'
                }`;

                // หากเคยตรวจแล้ว ให้ดึงคะแนนเดิมมาใส่
                if (booking.inspection && booking.inspection.length > 0) {
                    const insp = booking.inspection[0];
                    document.getElementById('floor_score').value = insp.floor_score;
                    document.getElementById('counter_score').value = insp.counter_score;
                    document.getElementById('finalResult').value = insp.result;
                }

                if (booking.users?.user_id) loadPhotos(booking.users.user_id);

            } catch (err) {
                console.error(err);
                Swal.fire('Error', 'ไม่สามารถโหลดข้อมูลได้: ' + err.message, 'error');
            }
        }

        // 3. Load Storage Photos
        async function loadPhotos(userId) {
            const { data: files } = await client.storage.from('task-images').list(userId + '/');
            const grid = document.getElementById('customerImages');
            grid.innerHTML = '';
            
            if (files && files.length > 0) {
                files.forEach(f => {
                    if (f.name === '.emptyFolderPlaceholder') return;
                    const { data: url } = client.storage.from('task-images').getPublicUrl(`${userId}/${f.name}`);
                    grid.innerHTML += `
                        <div class="relative group cursor-pointer overflow-hidden rounded-2xl aspect-square" onclick="window.open('${url.publicUrl}')">
                            <img src="${url.publicUrl}" class="h-full w-full object-cover group-hover:scale-110 transition-transform duration-500">
                            <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                                <i class="fa-solid fa-magnifying-glass-plus text-white text-xl"></i>
                            </div>
                        </div>`;
                });
            } else {
                grid.innerHTML = '<div class="col-span-3 flex flex-col items-center justify-center py-10 opacity-20"><i class="fa-solid fa-box-open text-4xl mb-3"></i><p class="text-xs">ไม่มีรูปภาพจากลูกค้า</p></div>';
            }
        }

        // 4. Save Task Logic
        document.getElementById('btnSaveTask').addEventListener('click', async () => {
            const status = document.getElementById('updateStatus').value;
            const fScore = parseInt(document.getElementById('floor_score').value);
            const cScore = parseInt(document.getElementById('counter_score').value);
            const result = document.getElementById('finalResult').value;

            if (status === 'Completed' && (isNaN(fScore) || isNaN(cScore))) {
                return Swal.fire('ข้อมูลไม่ครบ', 'กรุณาระบุคะแนนก่อนเปลี่ยนสถานะเป็น Completed', 'warning');
            }

            Swal.fire({
                title: 'ยืนยันการบันทึก?',
                background: '#1e293b',
                color: '#fff',
                showCancelButton: true,
                confirmButtonColor: '#00c3aa',
                confirmButtonText: 'บันทึกข้อมูล'
            }).then(async (res) => {
                if (res.isConfirmed) {
                    try {
                        // อัปเดตสถานะงาน
                        await client.from('booking').update({ status }).eq('booking_id', bookingId);

                        // บันทึกผลการตรวจลงตาราง inspection
                        if (status === 'Completed') {
                            await client.from('inspection').upsert([{
                                booking_id: bookingId,
                                floor_score: fScore,
                                counter_score: cScore,
                                total_score: (fScore + cScore) / 2,
                                result: result,
                                inspection_date: new Date().toISOString()
                            }], { onConflict: 'booking_id' });
                        }

                        await Swal.fire({ icon: 'success', title: 'อัปเดตเรียบร้อย', background: '#1e293b', color: '#fff' });
                        location.reload();
                    } catch (err) {
                        Swal.fire('Error', err.message, 'error');
                    }
                }
            });
        });

        init();
    </script>
</body>
</html>
