<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนผู้ใช้งาน - HygieGo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap');
        body { font-family: 'Kanit', sans-serif; }
    </style>
</head>
<body class="bg-[#0b1120] flex items-center justify-center min-h-screen p-6">

    <div class="bg-[#1e293b] p-8 md:p-10 rounded-3xl w-full max-w-lg shadow-2xl border border-gray-800">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">สมัครสมาชิก</h1>
            <p class="text-gray-400 text-sm">เริ่มต้นจัดการมาตรฐานร้านค้าของคุณกับ HygieGo</p>
        </div>
        
        <form id="registerForm" class="space-y-5 text-left">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-2 uppercase">ชื่อจริง</label>
                    <input type="text" id="firstName" required placeholder="ชื่อ" 
                        class="w-full px-4 py-3 rounded-xl bg-[#0f172a] border border-gray-700 text-white focus:border-[#00C3AA] outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-2 uppercase">นามสกุล</label>
                    <input type="text" id="lastName" required placeholder="นามสกุล" 
                        class="w-full px-4 py-3 rounded-xl bg-[#0f172a] border border-gray-700 text-white focus:border-[#00C3AA] outline-none transition-all">
                </div>
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-400 mb-2 uppercase">ชื่อร้านอาหาร / สถานประกอบการ</label>
                <div class="relative">
                    <i class="fa-solid fa-store absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="text" id="restaurantName" required placeholder="ระบุชื่อร้านของคุณ" 
                        class="w-full pl-12 pr-4 py-3 rounded-xl bg-[#0f172a] border border-gray-700 text-white focus:border-[#00C3AA] outline-none transition-all">
                </div>
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-400 mb-2 uppercase">อีเมล</label>
                <div class="relative">
                    <i class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="email" id="email" required placeholder="example@mail.com" 
                        class="w-full pl-12 pr-4 py-3 rounded-xl bg-[#0f172a] border border-gray-700 text-white focus:border-[#00C3AA] outline-none transition-all">
                </div>
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-400 mb-2 uppercase">รหัสผ่าน</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                    <input type="password" id="password" required placeholder="อย่างน้อย 6 ตัวอักษร" 
                        class="w-full pl-12 pr-4 py-3 rounded-xl bg-[#0f172a] border border-gray-700 text-white focus:border-[#00C3AA] outline-none transition-all">
                </div>
            </div>

            <button type="submit" class="w-full bg-[#00C3AA] text-white py-4 rounded-xl font-bold text-lg hover:bg-[#00a892] transition-all active:scale-[0.98] mt-4">
                ยืนยันการสมัครสมาชิก
            </button>
        </form>

        <div class="mt-8 text-center text-sm text-gray-500">
            มีบัญชีอยู่แล้ว? <a href="login.html" class="text-[#00C3AA] font-bold hover:underline">เข้าสู่ระบบ</a>
        </div>
    </div>

    <script type="module">
        const SUPABASE_URL = 'https://tfnvgsjfegrpsyuzthpn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_W6IMM3hM_0UK69ZMgaRrfA_PWJfL9j8';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            Swal.fire({ title: 'กำลังสร้างบัญชี...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const restaurantName = document.getElementById('restaurantName').value;

            try {
                // 1. ตรวจสอบอีเมลซ้ำในตาราง Users
                const { data: existingUser } = await client
                    .from('Users')
                    .select('email')
                    .eq('email', email)
                    .maybeSingle();

                if (existingUser) throw new Error("อีเมลนี้ถูกใช้งานไปแล้ว");

                // 2. บันทึกข้อมูลลงตาราง Users
                const { error: regError } = await client
                    .from('Users')
                    .insert([{
                        user_id: 'USR-' + Date.now(), // สร้าง ID ชั่วคราว
                        email: email,
                        password_hash: password, // ในระบบจริงควรทำ Hash ก่อนเก็บ
                        first_name: firstName,
                        last_name: lastName,
                        restaurant_name: restaurantName,
                        role: 'user', // บังคับเป็น user เท่านั้นตามคำขอ
                        payment_status: 'unpaid', // สถานะเริ่มต้นยังไม่จ่ายเงิน
                        created_at: new Date().toISOString()
                    }]);

                if (regError) throw regError;

                await Swal.fire({
                    icon: 'success',
                    title: 'สมัครสมาชิกสำเร็จ!',
                    text: 'กรุณาเข้าสู่ระบบเพื่อดำเนินการต่อ',
                    confirmButtonColor: '#00C3AA'
                });
                
                window.location.href = 'login.html';

            } catch (error) {
                Swal.fire('ผิดพลาด', error.message, 'error');
            }
        });
    </script>
</body>
</html>
